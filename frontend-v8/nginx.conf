# Extract the tenant slug from the leftmost subdomain of the Host header.
# The gateway's TenantExtractionMiddleware needs >=3 parts (e.g. aeroground.prm-app.com)
# but local dev uses aeroground.localhost which has only 2 parts. We pre-inject the
# X-Tenant-Slug header so the gateway's dev-mode fallback path picks it up.
map $host $extracted_tenant_slug {
  default                              "";
  "~^([a-z][a-z0-9-]+)\.localhost(:.*)?$" $1;
  "~^([a-z][a-z0-9-]+)\."              $1;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy /api/* to the gateway. Must come BEFORE the SPA fallback location so
  # that XHR calls don't get rewritten to index.html. The original Host header
  # is forwarded so the gateway's subdomain -> X-Tenant-Slug middleware sees
  # aeroground.localhost (etc.) rather than the compose service name. The
  # X-Tenant-Slug header is injected from $extracted_tenant_slug above.
  location /api/ {
    proxy_pass http://gateway:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Tenant-Slug $extracted_tenant_slug;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
  }

  location / { try_files $uri $uri/ /index.html; }

  location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
