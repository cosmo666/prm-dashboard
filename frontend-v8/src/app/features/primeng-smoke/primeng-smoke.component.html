<div class="smoke-page">
  <h1>PrimeNG Smoke Screen</h1>
  <p class="subtitle">Visual sanity check of every component used in this app.</p>

  <section>
    <h2>Buttons</h2>
    <button pButton label="Default"></button>
    <button pButton label="Flat" class="app-button-icon-flat"></button>
    <button pButton icon="pi pi-search" pTooltip="Search"></button>
    <button pButton icon="pi pi-cog" label="With icon"></button>
  </section>

  <section>
    <h2>Form fields (custom float-label)</h2>
    <app-form-field label="Email" hint="We never share emails">
      <input pInputText type="email" [(ngModel)]="inputValue">
    </app-form-field>

    <app-form-field label="Airport">
      <p-dropdown [options]="dropdownOptions" [(ngModel)]="dropdownValue"></p-dropdown>
    </app-form-field>

    <app-form-field label="Airports (multi)">
      <p-multiSelect [options]="dropdownOptions" [(ngModel)]="multiValue" defaultLabel="Select airports"></p-multiSelect>
    </app-form-field>

    <app-form-field label="Date">
      <p-calendar [(ngModel)]="date" dateFormat="dd-mm-yy"></p-calendar>
    </app-form-field>
  </section>

  <section>
    <h2>Switches &amp; checkboxes</h2>
    <p-checkbox [(ngModel)]="checkboxValue" [binary]="true" label="Enable feature"></p-checkbox>
    <p-inputSwitch [(ngModel)]="switchValue"></p-inputSwitch>
  </section>

  <section>
    <h2>Card + chart proof</h2>
    <p-card header="Bar chart">
      <app-bar-chart [data]="barData" [height]="240"></app-bar-chart>
    </p-card>
  </section>

  <section>
    <h2>Dialog</h2>
    <button pButton label="Open dialog" (click)="showDialog = true"></button>
    <p-dialog header="Hello" [(visible)]="showDialog" [modal]="true">
      Dialog content here.
    </p-dialog>
  </section>

  <section>
    <h2>Tabs</h2>
    <p-tabView>
      <p-tabPanel header="Tab one">First tab content</p-tabPanel>
      <p-tabPanel header="Tab two">Second tab content</p-tabPanel>
    </p-tabView>
  </section>
</div>
