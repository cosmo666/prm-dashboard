services:
  gateway:
    build:
      context: ./backend
      dockerfile: src/PrmDashboard.Gateway/Dockerfile
    container_name: prm-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - AUTH_SERVICE_URL=http://auth:8080
      - TENANT_SERVICE_URL=http://tenant:8080
      - PRM_SERVICE_URL=http://prm:8080
      - Jwt__Secret=${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      - Jwt__Issuer=${JWT_ISSUER:-prm-dashboard}
      - Jwt__Audience=${JWT_AUDIENCE:-prm-dashboard-client}
      - Cors__AllowedOrigins__0=http://localhost:4200
      - Cors__AllowedOrigins__1=http://aeroground.localhost:4200
      - Cors__AllowedOrigins__2=http://skyserve.localhost:4200
      - Cors__AllowedOrigins__3=http://globalprm.localhost:4200
      - Cors__AllowedOrigins__4=http://localhost:4300
      - Cors__AllowedOrigins__5=http://aeroground.localhost:4300
      - Cors__AllowedOrigins__6=http://skyserve.localhost:4300
      - Cors__AllowedOrigins__7=http://globalprm.localhost:4300
    depends_on:
      auth:
        condition: service_healthy
      tenant:
        condition: service_healthy
      prm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth:
    build:
      context: ./backend
      dockerfile: src/PrmDashboard.AuthService/Dockerfile
    container_name: prm-auth
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - PRM_DATA_PATH=/app/data
      - DataPath__MemoryLimit=${AUTH_DUCKDB_MEMORY_LIMIT:-256MB}
      - Jwt__Secret=${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      - Jwt__Issuer=${JWT_ISSUER:-prm-dashboard}
      - Jwt__Audience=${JWT_AUDIENCE:-prm-dashboard-client}
      - Jwt__AccessTokenMinutes=${JWT_ACCESS_TOKEN_MINUTES:-15}
      - Jwt__RefreshTokenDays=${JWT_REFRESH_TOKEN_DAYS:-7}
      - Cors__AllowedOrigins__0=http://localhost:4200
      - Cors__AllowedOrigins__1=http://aeroground.localhost:4200
      - Cors__AllowedOrigins__2=http://skyserve.localhost:4200
      - Cors__AllowedOrigins__3=http://globalprm.localhost:4200
      - Cors__AllowedOrigins__4=http://localhost:4300
      - Cors__AllowedOrigins__5=http://aeroground.localhost:4300
      - Cors__AllowedOrigins__6=http://skyserve.localhost:4300
      - Cors__AllowedOrigins__7=http://globalprm.localhost:4300
    volumes:
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  tenant:
    build:
      context: ./backend
      dockerfile: src/PrmDashboard.TenantService/Dockerfile
    container_name: prm-tenant
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - PRM_DATA_PATH=/app/data
      - DataPath__MemoryLimit=${TENANT_DUCKDB_MEMORY_LIMIT:-256MB}
      - Jwt__Secret=${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      - Jwt__Issuer=${JWT_ISSUER:-prm-dashboard}
      - Jwt__Audience=${JWT_AUDIENCE:-prm-dashboard-client}
      - Cors__AllowedOrigins__0=http://localhost:4200
      - Cors__AllowedOrigins__1=http://aeroground.localhost:4200
      - Cors__AllowedOrigins__2=http://skyserve.localhost:4200
      - Cors__AllowedOrigins__3=http://globalprm.localhost:4200
      - Cors__AllowedOrigins__4=http://localhost:4300
      - Cors__AllowedOrigins__5=http://aeroground.localhost:4300
      - Cors__AllowedOrigins__6=http://skyserve.localhost:4300
      - Cors__AllowedOrigins__7=http://globalprm.localhost:4300
    volumes:
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  prm:
    build:
      context: ./backend
      dockerfile: src/PrmDashboard.PrmService/Dockerfile
    container_name: prm-prm
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - PRM_DATA_PATH=/app/data
      - DataPath__MemoryLimit=${PRM_DUCKDB_MEMORY_LIMIT:-2GB}
      - Jwt__Secret=${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      - Jwt__Issuer=${JWT_ISSUER:-prm-dashboard}
      - Jwt__Audience=${JWT_AUDIENCE:-prm-dashboard-client}
      - Cors__AllowedOrigins__0=http://localhost:4200
      - Cors__AllowedOrigins__1=http://aeroground.localhost:4200
      - Cors__AllowedOrigins__2=http://skyserve.localhost:4200
      - Cors__AllowedOrigins__3=http://globalprm.localhost:4200
      - Cors__AllowedOrigins__4=http://localhost:4300
      - Cors__AllowedOrigins__5=http://aeroground.localhost:4300
      - Cors__AllowedOrigins__6=http://skyserve.localhost:4300
      - Cors__AllowedOrigins__7=http://globalprm.localhost:4300
    volumes:
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prm-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend-v8:
    build:
      context: ./frontend-v8
      dockerfile: Dockerfile
    container_name: prm-frontend-v8
    restart: unless-stopped
    ports:
      - "4300:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend-v8-dev:
    profiles: ["dev"]
    build:
      context: ./frontend-v8
      dockerfile: Dockerfile.dev
    image: prm-frontend-v8-dev:local
    working_dir: /app
    volumes:
      - ./frontend-v8:/app
    entrypoint: []
    command: sh

