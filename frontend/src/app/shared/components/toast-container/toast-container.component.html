<div class="toast-stack" role="status" aria-live="polite">
  <div class="toast"
       *ngFor="let t of toasts$ | async; trackBy: trackById"
       (click)="service.dismiss(t.id)">
    <span class="toast__dot" aria-hidden="true"></span>
    <span class="toast__text">{{ t.text }}</span>
  </div>
</div>
