<div class="login-layout">
  <div class="login-form-panel">
    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <h1>PRM Dashboard</h1>
      <p class="subtitle">Sign in to continue</p>

      <app-form-field label="Username"
                      [error]="usernameHasError() ? 'Username required' : undefined">
        <input pInputText type="text" formControlName="username" autocomplete="username">
      </app-form-field>

      <app-form-field label="Password"
                      [error]="passwordHasError() ? 'Password required' : undefined">
        <input pInputText type="password" formControlName="password" autocomplete="current-password">
      </app-form-field>

      <div class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button pButton type="submit" class="submit-btn"
              [disabled]="form.invalid || loading"
              [label]="loading ? 'Signing in…' : 'Sign in'"></button>
    </form>
  </div>

  <div class="login-parallax-panel" #parallaxPanel>
    <div class="parallax-shape parallax-shape-1"></div>
    <div class="parallax-shape parallax-shape-2"></div>
    <div class="parallax-content">
      <h2>Operations clarity for ground handling.</h2>
      <p>Real-time PRM analytics across your network.</p>
    </div>
  </div>
</div>
