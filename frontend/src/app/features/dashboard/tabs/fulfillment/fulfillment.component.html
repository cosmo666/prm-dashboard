<div class="fulfillment-content">
  <!-- Row 1: 4 KPI cards -->
  <div class="row row-kpis">
    <app-kpi-card
      label="PRM Requested"
      tooltip="Number of PRM services that were pre-booked by airlines or passengers before arrival."
      [value]="totalRequested() | compactNumber"
      accent="blue"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Provided vs Requested"
      tooltip="Ratio of services actually delivered vs those pre-requested. Above 100% means walk-up demand exceeded bookings."
      [value]="((providedPct() | number:'1.1-1') ?? '') + '%'"
      accent="green"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Total Provided"
      tooltip="Total PRM services actually delivered, including both pre-requested and walk-up passengers."
      [value]="totalProvided() | compactNumber"
      accent="teal"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Walk-up Rate"
      tooltip="Percentage of services that were not pre-booked — passengers who showed up unannounced needing PRM assistance."
      [value]="((walkupRate() | number:'1.1-1') ?? '') + '%'"
      accent="amber"
      [loading]="loading()"></app-kpi-card>
  </div>

  <!-- Row 2: Daily Provided vs Requested (full width dual-axis) -->
  <div class="row row-charts-full">
    <app-line-chart
      title="Daily Provided vs Requested"
      subtitle="Pre-requested services vs services actually provided"
      [series]="dualAxisSeries()"
      [loading]="loading()"
      [dualAxis]="true"
      [showAvgLine]="false"></app-line-chart>
  </div>

  <!-- Row 3: Time of Day + Cumulative pace -->
  <div class="row row-charts-1-1">
    <app-bar-chart
      title="Peak Hours"
      subtitle="When PRM demand is highest (4-hour windows)"
      [data]="timeOfDay()"
      [loading]="loading()"
      xLabel="Time Window"
      yLabel="Services"></app-bar-chart>
    <app-line-chart
      title="Cumulative Progress"
      subtitle="Running total vs even-pace target"
      [series]="cumulativeSeries()"
      [loading]="loading()"
      [showAvgLine]="false"></app-line-chart>
  </div>
</div>
