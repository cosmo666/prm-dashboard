<div class="fulfillment-content">
  <!-- Row 1: 4 KPI cards -->
  <div class="row row-kpis">
    <app-kpi-card
      label="PRM Requested"
      tooltip="Number of PRM services that were pre-booked by airlines or passengers before arrival. Walk-ups are counted separately."
      [value]="totalRequested() | compactNumber"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Pre-booked Share"
      tooltip="Share of delivered services that were pre-booked. The remainder are walk-ups — passengers who arrived without prior notice. A low value means demand is largely unannounced."
      [value]="((providedPct() | number:'1.1-1') ?? '') + '%'"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Total Provided"
      tooltip="Total PRM services actually delivered, including both pre-requested and walk-up passengers."
      [value]="totalProvided() | compactNumber"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Walk-up Rate"
      tooltip="Percentage of delivered services that were not pre-booked — passengers who showed up unannounced needing PRM assistance."
      [value]="((walkupRate() | number:'1.1-1') ?? '') + '%'"
      [loading]="loading()"></app-kpi-card>
  </div>

  <!-- Row 2: Daily Provided vs Requested (full width dual-axis) -->
  <div class="row row-charts-full">
    <app-line-chart
      title="Daily Provided vs Requested"
      subtitle="Pre-requested bookings vs services actually delivered (single shared scale — walk-ups drive the gap)"
      [series]="dualAxisSeries()"
      [loading]="loading()"
      [dualAxis]="false"
      [showAvgLine]="false"
      yLabel="PRM services (count)"
      unit="services"></app-line-chart>
  </div>

  <!-- Row 3: Time of Day + Cumulative pace -->
  <div class="row row-charts-1-1">
    <app-bar-chart
      title="Peak Hours"
      subtitle="When PRM demand is highest (4-hour windows)"
      [data]="timeOfDay()"
      [loading]="loading()"
      xLabel="Time window (24h)"
      yLabel="PRM services (count)"
      unit="services"></app-bar-chart>
    <app-line-chart
      title="Cumulative Progress"
      subtitle="Running total of PRM services vs an even-pace target"
      [series]="cumulativeSeries()"
      [loading]="loading()"
      [showAvgLine]="false"
      xLabel="Date"
      yLabel="Cumulative PRM services"
      unit="services"></app-line-chart>
  </div>
</div>
