<div class="fulfillment-content">
  <!-- Row 1: 4 KPI cards -->
  <div class="row row-kpis">
    <app-kpi-card
      label="PRM Requested"
      [value]="totalRequested() | compactNumber"
      accent="blue"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Provided vs Requested"
      [value]="((providedPct() | number:'1.1-1') ?? '') + '%'"
      accent="green"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Total Provided"
      [value]="totalProvided() | compactNumber"
      accent="teal"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Walk-up Rate"
      [value]="((walkupRate() | number:'1.1-1') ?? '') + '%'"
      accent="amber"
      [loading]="loading()"></app-kpi-card>
  </div>

  <!-- Row 2: Dual-axis + Sankey -->
  <div class="row row-charts-1-1">
    <app-line-chart
      title="Daily Provided vs Requested"
      subtitle="Dual axis"
      [series]="dualAxisSeries()"
      [loading]="loading()"
      [dualAxis]="true"
      [showAvgLine]="false"></app-line-chart>
    <app-sankey-chart
      title="Agent Type → Service → Flight"
      [nodes]="sankeyNodes()"
      [links]="sankeyLinks()"
      [loading]="loading()"></app-sankey-chart>
  </div>

  <!-- Row 3: Time of Day + Cumulative pace -->
  <div class="row row-charts-1-1">
    <app-bar-chart
      title="PRM by Time of Day"
      subtitle="Hourly buckets"
      [data]="timeOfDay()"
      [loading]="loading()"
      xLabel="Time Slot"
      yLabel="PRM Count"></app-bar-chart>
    <app-line-chart
      title="Cumulative PRM Pace"
      subtitle="Running total"
      [series]="cumulativeSeries()"
      [loading]="loading()"
      [showAvgLine]="false"></app-line-chart>
  </div>
</div>
