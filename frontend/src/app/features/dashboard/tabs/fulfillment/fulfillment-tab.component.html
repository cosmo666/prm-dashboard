<div class="fulfillment-content" *ngIf="(loading$ | async) !== null">
  <!-- Row 1: 4 KPI cards -->
  <div class="row row-kpis">
    <app-kpi-card
      label="PRM Requested"
      tooltip="Number of PRM services that were pre-booked by airlines or passengers before arrival."
      [value]="(totalRequested$ | async) | compactNumber"
      accent="blue"
      [loading]="loading$ | async"></app-kpi-card>
    <app-kpi-card
      label="Provided vs Requested"
      tooltip="Ratio of services actually delivered vs those pre-requested. Above 100% means walk-up demand exceeded bookings."
      [value]="((providedPct$ | async) | number:'1.1-1') + '%'"
      accent="green"
      [loading]="loading$ | async"></app-kpi-card>
    <app-kpi-card
      label="Total Provided"
      tooltip="Total PRM services actually delivered, including both pre-requested and walk-up passengers."
      [value]="(totalProvided$ | async) | compactNumber"
      accent="teal"
      [loading]="loading$ | async"></app-kpi-card>
    <app-kpi-card
      label="Walk-up Rate"
      tooltip="Percentage of services that were not pre-booked — passengers who showed up unannounced needing PRM assistance."
      [value]="((walkupRate$ | async) | number:'1.1-1') + '%'"
      accent="amber"
      [loading]="loading$ | async"></app-kpi-card>
  </div>

  <!-- Row 2: Daily Provided vs Requested (full-width dual-axis) -->
  <div class="row row-charts-full">
    <app-line-chart
      title="Daily Provided vs Requested"
      subtitle="Pre-requested services vs services actually provided"
      [series]="dualAxisSeries$ | async"
      [loading]="loading$ | async"
      [dualAxis]="true"
      [showAvgLine]="false"></app-line-chart>
  </div>

  <!-- Row 3: Peak Hours + Cumulative pace -->
  <div class="row row-charts-1-1">
    <app-bar-chart
      title="Peak Hours"
      subtitle="When PRM demand is highest (4-hour windows)"
      [data]="timeOfDay$ | async"
      [loading]="loading$ | async"
      xLabel="Time window (24h)"
      yLabel="PRM services (count)"
      unit="services"></app-bar-chart>
    <app-line-chart
      title="Cumulative Progress"
      subtitle="Running total of PRM services vs an even-pace target"
      [series]="cumulativeSeries$ | async"
      [loading]="loading$ | async"
      [showAvgLine]="false"
      xLabel="Date"
      yLabel="Cumulative PRM services"></app-line-chart>
  </div>
</div>
