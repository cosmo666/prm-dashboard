<div class="insights-content" *ngIf="(loading$ | async) !== null">
  <!-- Row 1: 4 KPI cards -->
  <div class="row row-kpis">
    <app-kpi-card
      label="Pause Rate"
      tooltip="Percentage of services that were paused mid-way and resumed later. High pause rates may indicate workflow interruptions or resource conflicts."
      [value]="((pauseRate$ | async) | number:'1.1-1') + '%'"
      accent="amber"
      [loading]="loading$ | async"></app-kpi-card>
    <app-kpi-card
      label="Outsourced Services"
      tooltip="Share of PRM services handled by contracted (outsourced) agents vs in-house staff. Higher outsourcing may indicate staffing gaps."
      [value]="((outsourcedPct$ | async) | number:'1.1-1') + '%'"
      accent="plum"
      [loading]="loading$ | async"></app-kpi-card>
    <app-kpi-card
      label="Avg Services per Agent"
      tooltip="Total services divided by total active agents. Indicates average workload per agent in the selected period."
      [value]="(avgPerAgent$ | async) | number:'1.1-1'"
      accent="blue"
      [loading]="loading$ | async"></app-kpi-card>
    <app-kpi-card
      label="No-Show Rate"
      tooltip="Percentage of passengers who booked PRM assistance but did not show up for the service. Impacts resource planning and staffing efficiency."
      [value]="((noShowRate$ | async) | number:'1.1-1') + '%'"
      accent="teal"
      [loading]="loading$ | async"></app-kpi-card>
  </div>

  <!-- Section 1: Agent Performance -->
  <div class="section-label">Agent Performance</div>
  <div class="row row-charts-6-4">
    <app-horizontal-bar-chart
      title="Agent Workload"
      [data]="agentWorkload$ | async"
      [loading]="loading$ | async"
      xLabel="Services"
      yLabel="Agent"
      (barClick)="onAgentClick($event && $event.category)"></app-horizontal-bar-chart>
    <app-heatmap-chart
      title="Agent Specialization"
      subtitle="Which agents handle which service types"
      [cells]="matrixCells$ | async"
      [xLabels]="matrixXLabels$ | async"
      [yLabels]="matrixYLabels$ | async"
      [loading]="loading$ | async"></app-heatmap-chart>
  </div>

  <!-- Section 2: Operational Patterns -->
  <div class="section-label">Operational Patterns</div>
  <div class="row row-charts-6-4">
    <app-heatmap-chart
      title="Hourly Demand"
      subtitle="When PRM services peak by day and hour"
      [cells]="hourlyHeatCells$ | async"
      [xLabels]="hourlyXLabels$ | async"
      [yLabels]="hourlyYLabels$ | async"
      [loading]="loading$ | async"></app-heatmap-chart>
    <app-bar-chart
      title="Self vs Outsourced Duration"
      subtitle="Average service time by handling type (minutes)"
      [data]="durationSelfBars$ | async"
      [series2]="durationOutBars$ | async"
      seriesName="Self"
      series2Name="Outsourced"
      series2Color="#fb8c00"
      [loading]="loading$ | async"
      xLabel="Service Type"
      yLabel="Avg Minutes"></app-bar-chart>
  </div>

  <!-- Section 3: Strategic Trends -->
  <div class="section-label">Strategic Trends</div>
  <div class="row row-charts-6-4">
    <app-line-chart
      title="Monthly Volume"
      subtitle="Service count trend over time"
      [series]="monthlyTrendSeries$ | async"
      [loading]="loading$ | async"
      [showAvgLine]="true"
      (pointClick)="onMonthClick($event)"></app-line-chart>
    <app-bar-chart
      title="No-Show Rate by Airline"
      subtitle="Passengers who booked PRM but didn't show up (%)"
      [data]="noShowBars$ | async"
      [loading]="loading$ | async"
      xLabel="Airline"
      yLabel="Rate %"
      unit="%"
      (barClick)="onNoShowAirlineClick($event)"></app-bar-chart>
  </div>
</div>
