<div class="overview-content" *ngIf="(loading$ | async) !== null">
  <!-- Row 1: 5 KPI cards -->
  <div class="row row-kpis">
    <app-kpi-card
      label="Total PRM Services"
      tooltip="The headline number â€” every unique PRM service delivered in the selected period. A service that was paused and resumed still counts once. Compare to the previous period (same window, shifted back) to see whether demand is trending up or down."
      [value]="(totalPrm$ | async) | compactNumber"
      unit="services"
      accent="blue"
      [delta]="totalDelta$ | async"
      [deltaLabel]="prevPeriodLabel$ | async"
      [subtext]="'Daily avg ' + (dailyAvg$ | async | number:'1.0-0') + ' Â· Peak day ' + (peakDay$ | async | number)"
      [loading]="loading$ | async"></app-kpi-card>
    <app-kpi-card
      label="Active Agents"
      tooltip="Distinct agents who handled at least one PRM service in the period. Self = in-house staff on the airline's payroll. Outsourced = contracted ground-handling agents. The split signals how dependent operations are on third-party labour."
      [value]="(activeAgents$ | async) | compactNumber"
      unit="agents"
      accent="teal"
      [subtext]="'Self ' + (agentsSelf$ | async) + ' Â· Outsourced ' + (agentsOutsourced$ | async)"
      [loading]="loading$ | async"></app-kpi-card>
    <app-kpi-card
      label="Services per Agent / Day"
      tooltip="Average services handled per agent per active working day. Higher = better utilization; too high (above ~6/day) often means overload, longer durations, or quality risk. Computed as total services Ă· total active agents Ă· active days."
      [value]="(avgPerAgent$ | async) | number:'1.1-1'"
      unit="/agent/day"
      accent="amber"
      [subtext]="'From ' + ((totalPrm$ | async) | compactNumber) + ' services across ' + (activeAgents$ | async) + ' agents'"
      [loading]="loading$ | async"></app-kpi-card>
    <app-kpi-card
      label="Avg Service Duration"
      tooltip="Average elapsed minutes from service start to end. Excludes time spent paused (e.g. waiting for a wheelchair to free up). Trending up means services are taking longer â€” could indicate longer routes, more complex needs, or scheduling issues."
      [value]="(avgDuration$ | async) | number:'1.0-0'"
      unit="min"
      accent="plum"
      [delta]="durationDelta$ | async"
      [deltaLabel]="prevPeriodLabel$ | async"
      subtext="From start to end, paused time excluded"
      [loading]="loading$ | async"></app-kpi-card>
    <app-kpi-card
      label="Fulfillment Rate"
      tooltip="Of services that were pre-booked (PRM-requested before arrival), what share was actually delivered. 100% means every booking was served. Drill into the Fulfillment tab to see the daily Provided-vs-Requested trend."
      [value]="(fulfillmentRate$ | async) | number:'1.1-1'"
      unit="%"
      accent="green"
      subtext="of pre-requested PRM bookings served"
      [loading]="loading$ | async"></app-kpi-card>
  </div>

  <!-- Row 2: Daily Trend (2/3) + Handling Distribution (1/3) -->
  <div class="row row-charts-2-1">
    <app-line-chart
      title="Daily PRM Trend"
      subtitle="Count of unique services per day"
      [series]="dailyTrendSeries$ | async"
      [loading]="loading$ | async"
      [annotations]="annotations"
      [showAvgLine]="true"
      (pointClick)="onDailyPointClick($event)"></app-line-chart>
    <app-donut-chart
      title="Handling Distribution"
      subtitle="Self vs Outsourced"
      [data]="handling$ | async"
      [loading]="loading$ | async"
      (segmentClick)="onHandlingClick($event)"></app-donut-chart>
  </div>

  <!-- Row 3: Service Types + Duration Distribution + Locations -->
  <div class="row row-charts-1-1-1">
    <app-donut-chart
      title="Service Type Breakdown"
      subtitle="Top 5 categories by volume"
      [data]="serviceTypes$ | async"
      [centerTotal]="totalPrm$ | async"
      centerCaption="OF TOTAL"
      [loading]="loading$ | async"
      (segmentClick)="onServiceTypeClick($event)"></app-donut-chart>
    <app-bar-chart
      title="Service Duration Spread"
      subtitle="How long services take"
      [data]="durationBuckets$ | async"
      [loading]="loading$ | async"
      xLabel="Duration bucket (minutes)"
      yLabel="PRM services (count)"
      unit="services"
      (barClick)="onDurationClick($event)"></app-bar-chart>
    <app-horizontal-bar-chart
      title="Services by Location"
      subtitle="Where PRM services are delivered"
      [data]="locations$ | async"
      [loading]="loading$ | async"
      xLabel="PRM services (count)"
      yLabel="Location"
      unit="services"
      (barClick)="onLocationClick($event)"></app-horizontal-bar-chart>
  </div>
</div>
