<div class="overview-content">
  <!-- Row 1: 5 KPI cards -->
  <div class="row row-kpis">
    <app-kpi-card
      label="Total PRM Services"
      tooltip="Total unique PRM services delivered in the selected period. Each service counts once even if paused and resumed."
      [value]="totalPrm() | compactNumber"
      accent="blue"
      [delta]="totalDelta()"
      [deltaLabel]="prevPeriodLabel()"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Active Agents"
      tooltip="Number of distinct agents who handled at least one PRM service. Split shows in-house (Self) vs contracted (Outsourced) agents."
      [value]="activeAgents() | compactNumber"
      accent="teal"
      [subtext]="'Self · ' + selfAgents() + '   Outsourced · ' + outsourcedAgents()"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Avg Services / Agent / Day"
      tooltip="Average number of PRM services each agent handles per working day. Higher means better utilization; too high may indicate overload."
      [value]="(avgPerAgent() | number:'1.1-1') ?? ''"
      accent="amber"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Avg Duration (min)"
      tooltip="Average time in minutes to complete a PRM service, from start to end. Excludes paused time for services that were interrupted."
      [value]="(avgDuration() | number:'1.0-0') ?? ''"
      accent="plum"
      [delta]="durationDelta()"
      [deltaLabel]="prevPeriodLabel()"
      [loading]="loading()"></app-kpi-card>
    <app-kpi-card
      label="Fulfillment Rate"
      tooltip="Percentage of pre-requested PRM services that were actually fulfilled. 100% means every booked request was served."
      [value]="((fulfillmentRate() | number:'1.1-1') ?? '') + '%'"
      accent="green"
      [loading]="loading()"></app-kpi-card>
  </div>

  <!-- Row 2: Daily Trend (2/3) + Handling Distribution (1/3) -->
  <div class="row row-charts-2-1">
    <app-line-chart
      title="Daily PRM Trend"
      subtitle="Count of unique services per day"
      [series]="dailyTrendSeries()"
      [loading]="loading()"
      [annotations]="annotations"
      [showAvgLine]="true"
      (pointClick)="onDailyPointClick($event)"
      class="col-2"></app-line-chart>
    <app-donut-chart
      title="Handling Distribution"
      subtitle="Self vs Outsourced"
      [data]="handling()"
      [loading]="loading()"
      (segmentClick)="onHandlingClick($event)"
      class="col-1"></app-donut-chart>
  </div>

  <!-- Row 3: Service Types + Duration Distribution + Locations -->
  <div class="row row-charts-1-1-1">
    <app-donut-chart
      title="Service Type Breakdown"
      subtitle="Top 5 categories by volume"
      [data]="serviceTypes()"
      [loading]="loading()"
      (segmentClick)="onServiceTypeClick($event)"></app-donut-chart>
    <app-bar-chart
      title="Service Duration Spread"
      subtitle="How long services take"
      [data]="durationBuckets()"
      [loading]="loading()"
      xLabel="Duration bucket (minutes)"
      yLabel="PRM services (count)"
      unit="services"
      (barClick)="onDurationClick($event)"></app-bar-chart>
    <app-horizontal-bar-chart
      title="Services by Location"
      subtitle="Where PRM services are delivered"
      [data]="locations()"
      [loading]="loading()"
      xLabel="PRM services (count)"
      yLabel="Location"
      unit="services"
      (barClick)="onLocationClick($event)"></app-horizontal-bar-chart>
  </div>
</div>
