<div class="filter-bar">
  <div class="filter-bar__head">
    <div class="label-micro">Filters</div>
    @if (filters.hasAnyFilter()) {
      <button class="clear-btn" (click)="clearAll()">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Clear</span>
      </button>
    }
  </div>

  <div class="filter-bar__body">
    <div class="filter-field">
      <label class="label-micro">Airline</label>
      <mat-select
        class="fb-select"
        [ngModel]="filters.airline() || ''"
        (ngModelChange)="setAirline($event || null)"
        panelClass="fb-panel"
        placeholder="All airlines">
        <mat-option [value]="''">All airlines</mat-option>
        @for (a of airlines(); track a) {
          <mat-option [value]="a">{{ a }}</mat-option>
        }
      </mat-select>
    </div>

    <div class="filter-field">
      <label class="label-micro">Service Type</label>
      <mat-select
        class="fb-select"
        [ngModel]="filters.service() || ''"
        (ngModelChange)="setService($event || null)"
        panelClass="fb-panel"
        placeholder="All services">
        <mat-option [value]="''">All services</mat-option>
        @for (s of services(); track s) {
          <mat-option [value]="s">{{ s }}</mat-option>
        }
      </mat-select>
    </div>

    <div class="filter-field">
      <label class="label-micro">Handled By</label>
      <mat-select
        class="fb-select"
        [ngModel]="filters.handledBy() || ''"
        (ngModelChange)="setHandledBy($event || null)"
        panelClass="fb-panel"
        placeholder="Both">
        <mat-option [value]="''">Both</mat-option>
        <mat-option value="SELF">Self</mat-option>
        <mat-option value="OUTSOURCED">Outsourced</mat-option>
      </mat-select>
    </div>

    <div class="filter-spacer"></div>

    <div class="filter-field filter-field--date">
      <label class="label-micro">Date Range</label>
      <app-date-range-picker></app-date-range-picker>
    </div>
  </div>

  @if (filters.hasAnyFilter()) {
    <div class="filter-bar__chips">
      @if (filters.airline()) {
        <button class="chip-pill" (click)="setAirline(null)" appTooltip="Remove filter">
          <span class="chip-pill__key">Airline</span>
          <span class="chip-pill__sep">·</span>
          <span class="chip-pill__val font-data">{{ filters.airline() }}</span>
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
            <path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      }
      @if (filters.service()) {
        <button class="chip-pill" (click)="setService(null)" appTooltip="Remove filter">
          <span class="chip-pill__key">Service</span>
          <span class="chip-pill__sep">·</span>
          <span class="chip-pill__val font-data">{{ filters.service() }}</span>
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
            <path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      }
      @if (filters.handledBy()) {
        <button class="chip-pill" (click)="setHandledBy(null)" appTooltip="Remove filter">
          <span class="chip-pill__key">Handled</span>
          <span class="chip-pill__sep">·</span>
          <span class="chip-pill__val font-data">{{ filters.handledBy() }}</span>
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
            <path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      }
    </div>
  }
</div>
