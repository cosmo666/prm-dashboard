server {
    listen 80;
    server_tokens off;

    # Security headers — applied to all responses
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # CSP — strict-ish for a dashboard, with two pragmatic relaxations required
    # by the runtime stack (not by choice):
    #   * style-src 'unsafe-inline' — Angular Material emits component styles inline.
    #   * script-src 'unsafe-eval' — Angular Material, @angular/animations, and
    #     ECharts all use `new Function()` / eval in hot paths (animation compiler,
    #     template interpolation, chart data formatters). Without this, mat-menu
    #     fails silently and menus render as raw inline DOM at the bottom of the
    #     page. We accept the relaxation and keep strict 'self' for everything
    #     else (default-src, img-src, font-src, connect-src, frame-ancestors).
    # Note: inline critical-CSS injection is disabled in angular.json so we don't
    # need script-src-attr 'unsafe-inline' for the onload handler Angular CLI
    # otherwise injects on the deferred stylesheet link.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http://localhost:5000 http://gateway:8080; frame-ancestors 'self';" always;
    # HSTS — only meaningful over HTTPS but safe to emit; takes effect when deployed behind TLS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
